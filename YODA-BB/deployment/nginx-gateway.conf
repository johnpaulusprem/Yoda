upstream meeting_service {
    server meeting-service:8010;
}

upstream document_service {
    server document-service:8011;
}

upstream chat_service {
    server chat-service:8012;
}

upstream dashboard_service {
    server dashboard-service:8013;
}

upstream pre_meeting_brief_service {
    server pre-meeting-brief-service:8014;
}

upstream weekly_digest_service {
    server weekly-digest-service:8015;
}

upstream frontend {
    server frontend:4200;
}

server {
    listen 80;
    server_name _;

    # Increase body size for document uploads
    client_max_body_size 50m;

    # ── Standard proxy headers ────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── Meeting service ───────────────────────────────────────────
    location /api/meetings {
        proxy_pass http://meeting_service;
    }

    location /api/action-items {
        proxy_pass http://meeting_service;
    }

    location /api/admin {
        proxy_pass http://meeting_service;
    }

    location /api/bot-events {
        proxy_pass http://meeting_service;
    }

    location /webhooks {
        proxy_pass http://meeting_service;
    }

    location /health {
        proxy_pass http://meeting_service;
    }

    # ── Document service ──────────────────────────────────────────
    location /api/documents {
        proxy_pass http://document_service;
    }

    # ── Chat service ──────────────────────────────────────────────
    location /api/chat {
        proxy_pass http://chat_service;
    }

    # ── Dashboard service ─────────────────────────────────────────
    location /api/dashboard {
        proxy_pass http://dashboard_service;
    }

    location /api/insights {
        proxy_pass http://document_service;
    }

    location /api/notifications {
        proxy_pass http://dashboard_service;
    }

    location /api/search {
        proxy_pass http://dashboard_service;
    }

    location /api/settings {
        proxy_pass http://dashboard_service;
    }

    # ── Pre-meeting brief service ─────────────────────────────────
    location /api/briefs {
        proxy_pass http://pre_meeting_brief_service;
    }

    # ── Weekly digest service ─────────────────────────────────────
    location /api/digests {
        proxy_pass http://weekly_digest_service;
    }

    # ── Frontend (catch-all — MUST be last) ──────────────────────
    location / {
        proxy_pass http://frontend;
    }
}
