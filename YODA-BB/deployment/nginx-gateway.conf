upstream yoda_api {
    server yoda-api:8001;
}

upstream yoda_worker {
    server yoda-worker:8002;
}

upstream frontend {
    server frontend:4200;
}

server {
    listen 80;
    server_name _;

    # Increase body size for document uploads
    client_max_body_size 50m;

    # ── Standard proxy headers ────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ── All API routes → yoda-api ─────────────────────────────────
    location /api/ {
        proxy_pass http://yoda_api;
    }

    location /webhooks {
        proxy_pass http://yoda_api;
    }

    location /health {
        proxy_pass http://yoda_api;
    }

    # ── Digest routes → yoda-worker ───────────────────────────────
    location /api/digests {
        proxy_pass http://yoda_worker;
    }

    # ── Frontend (catch-all — MUST be last) ──────────────────────
    location / {
        proxy_pass http://frontend;
    }
}
