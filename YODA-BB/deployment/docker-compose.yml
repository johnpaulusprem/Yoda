version: "3.9"

services:
  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: yoda
      POSTGRES_PASSWORD: yoda_dev
      POSTGRES_DB: yoda
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoda"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Application Services ────────────────────────────────────────
  yoda-api:
    build:
      context: ..
      dockerfile: services/yoda-api/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      PORT: "8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  yoda-worker:
    build:
      context: ..
      dockerfile: services/yoda-worker/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../../.env
    environment:
      PORT: "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  browser-bot:
    build:
      context: ../services/browser-bot
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../../.env
    environment:
      PORT: "3001"
      PYTHON_BACKEND_URL: "http://yoda-api:8001"
    depends_on:
      - yoda-api
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../yoda-frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    restart: unless-stopped

  # ── API Gateway ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - yoda-api
      - yoda-worker
      - browser-bot
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
