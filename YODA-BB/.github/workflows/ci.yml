name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [yoda-api, yoda-worker]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install foundation
        run: pip install -e "foundation/[dev]"

      - name: Install service
        run: pip install -e "services/${{ matrix.service }}/[dev]"

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --tb=short

  # ── Foundation Tests ───────────────────────────────────────────
  foundation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install foundation
        run: pip install -e "foundation/[dev]"

      - name: Run tests
        run: pytest foundation/tests/ -v --tb=short

  # ── Frontend Build ─────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: YODA-BB

      - uses: actions/checkout@v4
        with:
          path: yoda-frontend

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: yoda-frontend/package-lock.json

      - name: Install dependencies
        working-directory: yoda-frontend
        run: npm ci

      - name: Build production
        working-directory: yoda-frontend
        run: npx ng build --configuration=production

      - name: Run unit tests
        working-directory: yoda-frontend
        run: npx ng test --watch=false --browsers=ChromeHeadless || true

  # ── Lint ───────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint backend
        run: ruff check foundation/src/ services/yoda-api/src/ services/yoda-worker/src/ --select E,W,F --ignore E501
