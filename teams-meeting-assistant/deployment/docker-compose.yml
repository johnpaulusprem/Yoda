version: "3.8"
services:
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../app:/app/app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: meeting_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
