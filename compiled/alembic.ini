# Alembic Configuration — CXO AI Companion
# https://alembic.sqlalchemy.org/en/latest/

[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration files.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision identifiers to this length in log messages.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory.
sourceless = false

# Version-location path separator; OS-specific by default.
version_path_separator = os

# SQLAlchemy URL — overridden at runtime by env.py from app config.
# This is the sync fallback for offline mode only.
sqlalchemy.url = postgresql+asyncpg://cxo:localdev@localhost:5432/cxo_companion

# Output encoding for script files.
output_encoding = utf-8

[post_write_hooks]
# Run ruff format after generating migration files.
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
