services:
  # ─── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://cxo:localdev@postgres:5432/cxo_companion
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - ../src:/app/src:ro
    networks:
      - cxo-network

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cxo
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: cxo_companion
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cxo -d cxo_companion"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - cxo-network

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - cxo-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  cxo-network:
    driver: bridge
